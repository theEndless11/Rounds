workflows:
  ios-release:
    name: Rounds iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.19.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.rounds.social"
        APP_NAME: "Rounds"
      groups:
        - app_store_credentials
        - manual_signing

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: |
          rm -f package-lock.json && npm install

      - name: Build Vue/Vite app
        script: |
          npm run build

      - name: Capacitor sync iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App && pod install

      - name: Set up code signing
        script: |
          # Install certificate
          echo $CERTIFICATE_P12 | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          # Install provisioning profile
          echo $PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(grep -a -A1 'UUID' /tmp/profile.mobileprovision | grep -v UUID | tr -d '\t\n\r ' | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          echo "Profile UUID: $UUID"
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $CM_ENV

          # Get signing identity
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "iPhone Distribution" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Signing identity: $IDENTITY"
          echo "SIGNING_IDENTITY=$IDENTITY" >> $CM_ENV

      - name: Generate export options plist
        script: |
          cat > /Users/builder/export_options.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.rounds.social</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>signingCertificate</key>
            <string>$SIGNING_IDENTITY</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(agvtool what-version -terse) + 1))

      - name: Build iOS (archive)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath /Users/builder/clone/build/ios/xcarchive/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            PRODUCT_BUNDLE_IDENTIFIER=com.rounds.social \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath /Users/builder/clone/build/ios/xcarchive/App.xcarchive \
            -exportPath /Users/builder/clone/build/ios/ipa \
            -exportOptionsPlist /Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
