workflows:
  ios-release:
    name: Rounds iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20.19.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.rounds.social"
        APP_NAME: "Rounds"
        TEAM_ID: "UR2YXR7UBK"
      groups:
        - app_store_credentials
        - manual_signing

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: |
          rm -f package-lock.json && npm install

      - name: Build Vue/Vite app
        script: |
          npm run build

      - name: Capacitor sync iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App && pod install

      - name: Set up code signing
        script: |
          echo $CERTIFICATE_P12 | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          echo $PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(grep -a -A1 'UUID' /tmp/profile.mobileprovision | grep -v UUID | tr -d '\t\n\r ' | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          echo "Profile UUID: $UUID"
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $CM_ENV

          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "iPhone Distribution" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Signing identity: $IDENTITY"
          echo "SIGNING_IDENTITY=$IDENTITY" >> $CM_ENV

          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/auth_key.p8

      - name: Generate export options plist
        script: |
          cat > /Users/builder/export_options.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>UR2YXR7UBK</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.rounds.social</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>signingCertificate</key>
            <string>$SIGNING_IDENTITY</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Set build number
        script: |
          # Use timestamp as build number to always be unique
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "Setting build number to $BUILD_NUMBER"
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Build iOS (archive)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath /Users/builder/clone/build/ios/xcarchive/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            PRODUCT_BUNDLE_IDENTIFIER=com.rounds.social \
            DEVELOPMENT_TEAM=UR2YXR7UBK \
            COMPILER_INDEX_STORE_ENABLE=NO \
            OTHER_CODE_SIGN_FLAGS="--keychain build.keychain" \
            PODS_CODE_SIGN_STYLE=Manual \
            PODS_SIGNING_STYLE=Manual

      - name: Remove provisioning profiles from frameworks in archive
        script: |
          ARCHIVE=/Users/builder/clone/build/ios/xcarchive/App.xcarchive
          APP_PATH="$ARCHIVE/Products/Applications/App.app"

          echo "Removing provisioning profiles from frameworks..."
          find "$APP_PATH/Frameworks" -name "*.framework" | while read fw; do
            name=$(basename "$fw")
            if [ -f "$fw/embedded.mobileprovision" ]; then
              rm "$fw/embedded.mobileprovision"
              echo "Removed profile from: $name"
            fi
            # Also fix bundle ID in Info.plist
            plist="$fw/Info.plist"
            if [ -f "$plist" ]; then
              current_id=$(/usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$plist" 2>/dev/null)
              if [ "$current_id" = "com.rounds.social" ]; then
                clean=$(echo "$name" | sed 's/.framework//' | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9')
                /usr/libexec/PlistBuddy -c "Set CFBundleIdentifier com.rounds.social.fw.$clean" "$plist"
                echo "Fixed bundle ID: $name -> com.rounds.social.fw.$clean"
              fi
            fi
          done
          echo "Done"

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath /Users/builder/clone/build/ios/xcarchive/App.xcarchive \
            -exportPath /Users/builder/clone/build/ios/ipa \
            -exportOptionsPlist /Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true