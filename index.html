<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!--
      viewport-fit=cover is NOT used here because overlaysWebView:false.
      The status bar is managed natively by iOS — no edge-to-edge overlay needed.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" id="theme-color-meta" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!--
      "black" = black status bar background with WHITE icons.
      This is correct for dark-background apps with overlaysWebView:false.
      - "default"           → white status bar, BLACK icons → invisible on dark apps ✗
      - "black"             → black status bar, WHITE icons → correct for dark apps ✓
      - "black-translucent" → transparent, edge-to-edge    → only for overlaysWebView:true ✗
    -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <title>Rounds - Medical Social Network</title>
    <script>
      (function() {
        try {
          const stored = localStorage.getItem('CAPStorage::app-theme');
          const isLight = stored === '"light"';
          const bg = isLight ? '#ffffff' : '#000000';
          document.documentElement.style.backgroundColor = bg;
          document.documentElement.style.setProperty('background-color', bg, 'important');
          const meta = document.getElementById('theme-color-meta');
          if (meta) meta.content = bg;
          // Also update status bar style meta for correct icon color on light pre-load
          const sbMeta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
          if (sbMeta) sbMeta.content = isLight ? 'default' : 'black';
          if (isLight) document.documentElement.classList.add('light-pre');
        } catch(e) {}
      })();
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        min-height: 100vh;
      }
      body.light {
        background-color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
