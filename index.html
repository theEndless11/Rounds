<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- NO viewport-fit=cover — we are NOT overlaying the status bar anymore -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" id="theme-color-meta" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Default: dark = light icons on dark bg. Light mode overrides to 'black' = dark icons -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" id="apple-status-meta" />
    <title>Rounds - Medical Social Network</title>

    <script>
      (function() {
        try {
          const stored = localStorage.getItem('CAPStorage::app-theme');
          const isLight = stored === '"light"';
          const bg = isLight ? '#ffffff' : '#000000';

          document.documentElement.style.backgroundColor = bg;
          document.documentElement.style.setProperty('background-color', bg, 'important');

          const meta = document.getElementById('theme-color-meta');
          if (meta) meta.content = bg;

          const appleMeta = document.getElementById('apple-status-meta');
          if (appleMeta) {
            // 'black' = dark icons (for light bg), 'default' = dark icons on white
            appleMeta.content = isLight ? 'black' : 'black-translucent';
          }

          if (isLight) document.body.classList.add('light');
        } catch(e) {}
      })();
    </script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        min-height: 100vh;
      }
      body.light {
        background-color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
