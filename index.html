<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>Rounds - Medical Social Network</title>
    <script>
      // Apply theme before Vue loads to prevent background flash
      try {
        const stored = localStorage.getItem('CAPStorage::app-theme');
        const isLight = stored === '"light"';
        document.documentElement.style.backgroundColor = isLight ? '#ffffff' : '#000000';
        document.body && (document.body.style.backgroundColor = isLight ? '#ffffff' : '#000000');
        if (isLight) document.body && document.body.classList.add('light');
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
