<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!--
      viewport-fit=cover is NOT used here because overlaysWebView:false.
      The status bar is managed natively by iOS — no edge-to-edge overlay needed.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" id="theme-color-meta" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!--
      "default" (not "black-translucent") because overlaysWebView:false.
      black-translucent is only for edge-to-edge overlay mode and causes
      the status bar to be invisible when the app background matches it.
    -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Rounds - Medical Social Network</title>
    <script>
      (function() {
        try {
          const stored = localStorage.getItem('CAPStorage::app-theme');
          const isLight = stored === '"light"';
          const bg = isLight ? '#ffffff' : '#000000';
          document.documentElement.style.backgroundColor = bg;
          document.documentElement.style.setProperty('background-color', bg, 'important');
          const meta = document.getElementById('theme-color-meta');
          if (meta) meta.content = bg;
          if (isLight) document.documentElement.classList.add('light-pre');
        } catch(e) {}
      })();
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        min-height: 100vh;
      }
      body.light {
        background-color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
