import os
import torch
import torch.nn as nn
from torch.utils.data import Dataset, DataLoader
import json
import math
import subprocess
import sys
from torch.cuda.amp import GradScaler

print("Installing packages...")
subprocess.run([sys.executable, "-m", "pip", "install", "-q", 
                "tiktoken", "transformers", "flash-attn", "--no-build-isolation"], 
               check=False)

from transformers import GPT2TokenizerFast
from flash_attn import flash_attn_func

# Enable TF32 for matrix multiplications (H100 optimization)
torch.backends.cuda.matmul.allow_tf32 = True
torch.backends.cudnn.allow_tf32 = True

# ============================================================================
# TOKENIZER
# ============================================================================
class TokenizerWrapper:
    def __init__(self):
        self.tokenizer = GPT2TokenizerFast.from_pretrained('gpt2')
        self.vocab_size = len(self.tokenizer)
    
    def encode(self, text):
        return self.tokenizer.encode(text) if text else []

# ============================================================================
# DPO DATASET
# ============================================================================
class DPODataset(Dataset):
    def __init__(self, jsonl_file, tokenizer, seq_length):
        self.tokenizer = tokenizer
        self.seq_length = seq_length
        self.pairs = []
        
        # Read pairs (2 lines at a time)
        print(f"Loading {jsonl_file}...")
        with open(jsonl_file, 'r', encoding='utf-8') as f:
            lines = f.readlines()
        
        for i in range(0, len(lines), 2):
            if i + 1 >= len(lines):
                break
            
            chosen_data = json.loads(lines[i])
            rejected_data = json.loads(lines[i + 1])
            
            if chosen_data.get('label') == 'chosen' and rejected_data.get('label') == 'rejected':
                self.pairs.append({
                    'chosen': chosen_data['conversations'],
                    'rejected': rejected_data['conversations']
                })
        
        print(f"Loaded {len(self.pairs):,} preference pairs")
    
    def format_conversation(self, messages):
        text = ""
        for msg in messages:
            role = msg.get('role', '')
            content = msg.get('content', '')
            if role in ['user', 'human']:
                text += f"<|human|>{content}<|end|>"
            elif role == 'assistant':
                text += f"<|assistant|>{content}<|end|>"
        return text
    
    def __len__(self):
        return len(self.pairs)
    
    def __getitem__(self, idx):
        pair = self.pairs[idx]
        
        # Tokenize chosen
        chosen_text = self.format_conversation(pair['chosen'])
        chosen_tokens = self.tokenizer.encode(chosen_text)[:self.seq_length]
        chosen_tokens += [0] * (self.seq_length - len(chosen_tokens))
        
        # Tokenize rejected
        rejected_text = self.format_conversation(pair['rejected'])
        rejected_tokens = self.tokenizer.encode(rejected_text)[:self.seq_length]
        rejected_tokens += [0] * (self.seq_length - len(rejected_tokens))
        
        # Find prompt length
        prompt_msgs = [m for m in pair['chosen'] if m.get('role') != 'assistant']
        if prompt_msgs:
            prompt_text = self.format_conversation(prompt_msgs)
            prompt_len = len(self.tokenizer.encode(prompt_text))
        else:
            prompt_len = 0
        
        return {
            'chosen': torch.tensor(chosen_tokens, dtype=torch.long),
            'rejected': torch.tensor(rejected_tokens, dtype=torch.long),
            'prompt_len': torch.tensor(prompt_len, dtype=torch.long)
        }

# ============================================================================
# FLASH ATTENTION 3 (H100 optimized)
# ============================================================================
class FlashAttention3(nn.Module):
    def __init__(self, d_model, n_heads, dropout=0.1):
        super().__init__()
        assert d_model % n_heads == 0
        self.d_model = d_model
        self.n_heads = n_heads
        self.d_k = d_model // n_heads
        
        self.qkv = nn.Linear(d_model, 3 * d_model, bias=False)
        self.out = nn.Linear(d_model, d_model, bias=False)
        self.dropout_p = dropout
    
    def forward(self, x):
        batch_size, seq_len, _ = x.shape
        
        # QKV projection
        qkv = self.qkv(x).reshape(batch_size, seq_len, 3, self.n_heads, self.d_k)
        qkv = qkv.permute(2, 0, 3, 1, 4)  # (3, B, H, S, D)
        q, k, v = qkv[0], qkv[1], qkv[2]
        
        # Flash Attention 3 (optimized for H100)
        out = flash_attn_func(
            q, k, v,
            dropout_p=self.dropout_p if self.training else 0.0,
            causal=True,
            window_size=(-1, -1),  # Full attention
            alibi_slopes=None,
            deterministic=False
        )
        
        # Reshape and project
        out = out.reshape(batch_size, seq_len, self.d_model)
        return self.out(out)

# ============================================================================
# SWIGLU FEEDFORWARD (Better than GELU for H100)
# ============================================================================
class SwiGLU(nn.Module):
    def __init__(self, d_model, d_ff, dropout=0.1):
        super().__init__()
        self.w1 = nn.Linear(d_model, d_ff, bias=False)
        self.w2 = nn.Linear(d_ff, d_model, bias=False)
        self.w3 = nn.Linear(d_model, d_ff, bias=False)
        self.dropout = nn.Dropout(dropout)
    
    def forward(self, x):
        return self.w2(self.dropout(nn.functional.silu(self.w1(x)) * self.w3(x)))

# ============================================================================
# TRANSFORMER BLOCK
# ============================================================================
class TransformerBlock(nn.Module):
    def __init__(self, d_model, n_heads, d_ff, dropout=0.1):
        super().__init__()
        self.attention = FlashAttention3(d_model, n_heads, dropout)
        self.norm1 = nn.RMSNorm(d_model)  # RMSNorm faster than LayerNorm
        self.ff = SwiGLU(d_model, d_ff, dropout)
        self.norm2 = nn.RMSNorm(d_model)
    
    def forward(self, x):
        # Pre-norm architecture (more stable)
        x = x + self.attention(self.norm1(x))
        x = x + self.ff(self.norm2(x))
        return x

# ============================================================================
# MODEL
# ============================================================================
class TinyTransformer(nn.Module):
    def __init__(self, vocab_size, d_model, n_layers, n_heads, d_ff, seq_length, dropout=0.1):
        super().__init__()
        self.d_model = d_model
        self.seq_length = seq_length
        
        self.token_embedding = nn.Embedding(vocab_size, d_model)
        self.position_embedding = nn.Embedding(seq_length, d_model)
        
        self.blocks = nn.ModuleList([
            TransformerBlock(d_model, n_heads, d_ff, dropout) for _ in range(n_layers)
        ])
        
        self.norm = nn.RMSNorm(d_model)
        self.lm_head = nn.Linear(d_model, vocab_size, bias=False)
        
        # Weight tying
        self.lm_head.weight = self.token_embedding.weight
        
        self.apply(self._init_weights)
    
    def _init_weights(self, module):
        if isinstance(module, nn.Linear):
            torch.nn.init.normal_(module.weight, mean=0.0, std=0.02)
        elif isinstance(module, nn.Embedding):
            torch.nn.init.normal_(module.weight, mean=0.0, std=0.02)
    
    def forward(self, x):
        batch_size, seq_len = x.shape
        positions = torch.arange(0, seq_len, dtype=torch.long, device=x.device).unsqueeze(0)
        
        x = self.token_embedding(x) + self.position_embedding(positions)
        
        for block in self.blocks:
            x = block(x)
        
        x = self.norm(x)
        return self.lm_head(x)

# ============================================================================
# DPO LOSS (with numerical stability)
# ============================================================================
def dpo_loss(model, batch, beta=0.1, label_smoothing=0.0):
    """DPO Loss with label smoothing for stability"""
    chosen = batch['chosen']
    rejected = batch['rejected']
    prompt_len = batch['prompt_len']
    
    # Forward pass
    with torch.amp.autocast('cuda', dtype=torch.bfloat16):
        chosen_logits = model(chosen)
        rejected_logits = model(rejected)
    
    # Compute log probs
    chosen_logprobs = torch.log_softmax(chosen_logits, dim=-1)
    rejected_logprobs = torch.log_softmax(rejected_logits, dim=-1)
    
    # Get log probs of actual tokens
    chosen_tokens = chosen[:, 1:]
    rejected_tokens = rejected[:, 1:]
    
    chosen_lp = torch.gather(chosen_logprobs[:, :-1], -1, chosen_tokens.unsqueeze(-1)).squeeze(-1)
    rejected_lp = torch.gather(rejected_logprobs[:, :-1], -1, rejected_tokens.unsqueeze(-1)).squeeze(-1)
    
    # Mask prompt tokens (handle batch of different prompt lengths)
    batch_size = chosen_lp.shape[0]
    seq_len = chosen_lp.shape[1]
    
    # Convert prompt_len to tensor if needed
    if isinstance(prompt_len, int):
        prompt_len = torch.tensor([prompt_len] * batch_size, device=chosen_lp.device)
    elif not isinstance(prompt_len, torch.Tensor):
        prompt_len = torch.tensor(prompt_len, device=chosen_lp.device)
    
    # Create mask for each sample in batch
    positions = torch.arange(seq_len, device=chosen_lp.device).unsqueeze(0)  # [1, seq_len]
    mask = positions >= prompt_len.unsqueeze(1)  # [batch, seq_len]
    mask = mask.float()
    
    chosen_lp = (chosen_lp * mask).sum(-1) / (mask.sum(-1) + 1e-8)
    rejected_lp = (rejected_lp * mask).sum(-1) / (mask.sum(-1) + 1e-8)
    
    # DPO objective with label smoothing
    logits = beta * (chosen_lp - rejected_lp)
    loss = -torch.nn.functional.logsigmoid(logits).mean()
    
    if label_smoothing > 0:
        loss = (1 - label_smoothing) * loss + label_smoothing * 0.5
    
    # Metrics
    accuracy = (logits > 0).float().mean()
    
    return loss, accuracy

# ============================================================================
# CONFIG
# ============================================================================
class DPOConfig:
    vocab_size = 50257
    d_model = 1728
    n_layers = 24
    n_heads = 16
    d_ff = 6912
    dropout = 0.1
    seq_length = 1024
    
    # H100 optimized settings
    batch_size = 8  # H100 has 80GB VRAM
    gradient_accumulation_steps = 4  # Effective batch = 32
    learning_rate = 5e-7
    beta = 0.1
    label_smoothing = 0.0
    weight_decay = 0.01
    max_grad_norm = 1.0
    warmup_steps = 100
    num_epochs = 1
    
    # Mixed precision
    use_bf16 = True  # H100 native bfloat16
    compile_model = True  # torch.compile for 2x speedup
    
    # Paths
    pretrained_checkpoint = "/teamspace/studios/this_studio/finetune_checkpoints/model_final_sft.pt"
    dpo_data = "/teamspace/studios/this_studio/ultrafeedback_rlhf.jsonl"
    
    checkpoint_dir = "./dpo_checkpoints"
    log_file = "./dpo_log.jsonl"
    
    save_every = 500
    print_every = 50

config = DPOConfig()

# ============================================================================
# TRAINING
# ============================================================================
def train_dpo(config):
    device = torch.device('cuda' if torch.cuda.is_available() else 'cpu')
    print(f"Device: {device}")
    print(f"GPU: {torch.cuda.get_device_name(0)}")
    print(f"VRAM: {torch.cuda.get_device_properties(0).total_memory / 1e9:.1f} GB")
    
    os.makedirs(config.checkpoint_dir, exist_ok=True)
    
    # Tokenizer
    tokenizer = TokenizerWrapper()
    
    # Dataset
    dataset = DPODataset(config.dpo_data, tokenizer, config.seq_length)
    dataloader = DataLoader(
        dataset, 
        batch_size=config.batch_size, 
        shuffle=True, 
        num_workers=4,
        pin_memory=True,
        persistent_workers=True
    )
    
    # Model
    print("Loading model...")
    model = TinyTransformer(
        vocab_size=config.vocab_size,
        d_model=config.d_model,
        n_layers=config.n_layers,
        n_heads=config.n_heads,
        d_ff=config.d_ff,
        seq_length=config.seq_length,
        dropout=config.dropout
    ).to(device)
    
    # Load pretrained
    checkpoint = torch.load(config.pretrained_checkpoint, map_location='cpu', weights_only=False)
    model_state = {k: v.float() for k, v in checkpoint['model_state_dict'].items()}
    model.load_state_dict(model_state, strict=False)
    print("Loaded pretrained weights")
    
    # Compile model (2x speedup on H100)
    if config.compile_model:
        print("Compiling model...")
        model = torch.compile(model, mode='default')  # or just disable it
    
    # Optimizer (AdamW with fused kernels for H100)
    optimizer = torch.optim.AdamW(
        model.parameters(),
        lr=config.learning_rate,
        weight_decay=config.weight_decay,
        betas=(0.9, 0.95),
        fused=True  # H100 optimization
    )
    
    # Scheduler
    total_steps = len(dataloader) * config.num_epochs // config.gradient_accumulation_steps
    
    def lr_lambda(step):
        if step < config.warmup_steps:
            return step / config.warmup_steps
        progress = (step - config.warmup_steps) / max(1, total_steps - config.warmup_steps)
        return max(0.1, 0.5 * (1 + math.cos(math.pi * progress)))
    
    scheduler = torch.optim.lr_scheduler.LambdaLR(optimizer, lr_lambda)
    
    # Mixed precision scaler
    scaler = GradScaler(enabled=config.use_bf16)
    
    print(f"\nStarting DPO training...")
    print(f"Total steps: ~{total_steps:,}")
    print(f"Effective batch size: {config.batch_size * config.gradient_accumulation_steps}")
    
    global_step = 0
    running_loss = 0.0
    running_acc = 0.0
    optimizer.zero_grad()
    
    for epoch in range(config.num_epochs):
        model.train()
        
        for batch_idx, batch in enumerate(dataloader):
            # Move to device
            batch = {k: v.to(device) if torch.is_tensor(v) else v for k, v in batch.items()}
            
            # Forward + backward
            loss, acc = dpo_loss(model, batch, beta=config.beta, label_smoothing=config.label_smoothing)
            loss = loss / config.gradient_accumulation_steps
            
            scaler.scale(loss).backward()
            
            if (batch_idx + 1) % config.gradient_accumulation_steps == 0:
                running_loss += loss.item() * config.gradient_accumulation_steps
                running_acc += acc.item()
                
                # Gradient clipping
                scaler.unscale_(optimizer)
                torch.nn.utils.clip_grad_norm_(model.parameters(), config.max_grad_norm)
                
                # Optimizer step
                scaler.step(optimizer)
                scaler.update()
                scheduler.step()
                optimizer.zero_grad()
                
                global_step += 1
                
                if global_step % config.print_every == 0:
                    avg_loss = running_loss / config.print_every
                    avg_acc = running_acc / config.print_every
                    lr = scheduler.get_last_lr()[0]
                    print(f"Step {global_step:,} | Loss: {avg_loss:.4f} | Acc: {avg_acc:.3f} | LR: {lr:.2e}")
                    
                    with open(config.log_file, 'a') as f:
                        f.write(json.dumps({
                            'step': global_step,
                            'loss': round(avg_loss, 4),
                            'accuracy': round(avg_acc, 3),
                            'lr': f"{lr:.2e}"
                        }) + '\n')
                    
                    running_loss = 0.0
                    running_acc = 0.0
                
                if global_step % config.save_every == 0:
                    save_path = os.path.join(config.checkpoint_dir, f"dpo_step{global_step}.pt")
                    torch.save({
                        'model_state_dict': {k: v.cpu().half() for k, v in model.state_dict().items()},
                        'step': global_step,
                        'epoch': epoch
                    }, save_path)
                    print(f"Saved {save_path}")
    
    # Final save
    final_path = os.path.join(config.checkpoint_dir, "dpo_final.pt")
    torch.save({
        'model_state_dict': {k: v.cpu().half() for k, v in model.state_dict().items()},
        'step': global_step
    }, final_path)
    print(f"\nTraining complete! Saved to {final_path}")

if __name__ == "__main__":
    train_dpo(config)